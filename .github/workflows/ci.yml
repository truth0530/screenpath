name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need tags for the version check

      - name: ShellCheck
        run: shellcheck bin/screenpath scripts/*.sh test/*.sh

      - name: Syntax check
        run: bash -n bin/screenpath

      - name: Tests
        run: ./test/run.sh

      - name: Version consistency
        run: ./scripts/check-version.sh

  macos:
    # Exercise the real runtime: macOS ships bash 3.2, which differs from Linux bash 5.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show bash version
        run: /bin/bash --version | head -1
      - name: Syntax check (bash 3.2)
        run: /bin/bash -n bin/screenpath
      - name: Tests (bash 3.2)
        run: /bin/bash test/run.sh
